version: 1
description: Short, diverse media fixtures for batch_encoder.
default_media_root: .cache/batch_encoder_fixtures

profiles:
  small:
    max_total_bytes: 2147483648
    include_tags:
      - generated
      - external-small
  generated:
    include_tags:
      - generated
  external:
    include_tags:
      - external-small

generated:
  - id: h264_aac_mp4
    path: generated/h264_aac_2s.mp4
    recipe: h264_aac_mp4
    tags: [generated, mp4, h264, aac]
    expect:
      video_streams: 1
      audio_streams: 1
      video_codecs: [h264]
      audio_codecs: [aac]

  - id: hevc_aac_mp4
    path: generated/hevc_aac_2s.mp4
    recipe: hevc_aac_mp4
    tags: [generated, mp4, hevc, aac, efficient]
    expect:
      video_streams: 1
      audio_streams: 1
      video_codecs: [hevc]
      audio_codecs: [aac]

  - id: av1_opus_mkv
